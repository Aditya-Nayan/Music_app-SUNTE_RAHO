<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNTE RAHO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo"> 🎵 </h1>
            <nav>
                <a href="#" class="nav-item active"><i class="fas fa-home"></i> Home</a>
                <a href="#" class="nav-item"><i class="fas fa-search"></i> Search</a>
                <a href="#" class="nav-item"><i class="fas fa-grip-lines"></i> Your Library</a>
            </nav>
            <div class="playlists-section">
                <h2>Playlists</h2>
                <p>Login to see your playlists.</p>
                <button class="create-playlist"><i class="fas fa-plus"></i> New Playlist</button>
            </div>
            <div class="auth-status">
                <button id="auth-btn">Sign Up / Login</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="app-header">
                <input type="text" placeholder="Search for songs, artists, or genres..." class="search-bar">
                <i class="fas fa-moon dark-mode-toggle" id="dark-mode-toggle"></i>
            </header>

            <section class="content-area">
                <h2>Featured Albums</h2>
                <div class="album-grid">
                    <div class="album-card" data-song-id="1">
                        <img src="image.png/techno-party-lifestyle.jpg" alt="Album Art">
                        <h3>Smooth</h3>
                        <p>Soft bollywood</p>
                    </div>
                    </div>

                <h2>Genre</h2>
                <div class="genre-list">
                    <button class="genre-tag"><i>Slow and Reverbed</i></button>
                    <button class="genre-tag"><i>Party Songs</i></button>
                    <button class="genre-tag"><i>Romantic</i></button>
                </div>
            </section>
        </main>

        <footer class="player-bar">
            <audio id="audio-player" src="songs.mp3/mohit-chauhan-abhi-kuch-dino-se.mp3"></audio>

            <div class="song-info">
                <img src="image.png/abhi_kuch_dinose_image.png" alt="Current Song Art" class="song-art">
                <div>
                    <h4 id="player-song-title">A Nice Beat</h4>
                    <p id="player-artist-name">Unknown Artist</p>
                </div>
            </div>

            <div class="controls-area">
                <div class="player-controls">
                    <button id="prev-btn" class="control-btn"><i class="fas fa-backward"></i></button>
                    <button id="play-pause-btn" class="control-btn play"><i class="fas fa-play"></i></button>
                    <button id="next-btn" class="control-btn"><i class="fas fa-forward"></i></button>
                </div>

                <div class="time-controls">
                    <span id="current-time">0:00</span>
                    <input type="range" id="seek-bar" value="0" max="100">
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="extra-controls">
                <button id="like-btn" class="control-btn"><i class="far fa-heart"></i></button>
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volume-bar" value="100" max="100">
            </div>
        </footer>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>User Authentication</h2>
            <div id="auth-error" class="error-message"></div>
            
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-password" placeholder="Password" required>
            
            <button id="login-btn">Log In</button>
            <button id="signup-btn">Sign Up</button>
            
            <p class="switch-mode">New user? Click 'Sign Up'.</p>
        </div>
    </div>

    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <span class="close-playlist-btn">&times;</span>
            <h2>Create New Playlist</h2>
            <input type="text" id="playlist-name-input" placeholder="Playlist Name" required>
            <button id="create-playlist-submit">Create</button>
        </div>
    </div>
</body>
</html>
